<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    .jianpu {
      font-family: "Courier New", monospace;
      font-size: 24px;
      line-height: 2;
    }
    .jianpu-note {
      display: inline-block;
      margin: 0 4px;
      position: relative;
    }
    .jianpu-high { 
      border-top: 2px solid black; 
      padding-top: 4px;
    }
    .jianpu-low { 
      border-bottom: 2px solid black; 
      padding-bottom: 4px;
    }
    .jianpu-dot {
      position: absolute;
      right: -8px;
      top: 0;
    }
    .jianpu-header {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="jianpu">
    <div class="jianpu-header">
      1=G &nbsp;&nbsp; 4/4 &nbsp;&nbsp; ♩=96
    </div>
    <div class="jianpu-notes">
      <span class="jianpu-note">48</span> <span class="jianpu-note">58</span> <span class="jianpu-note">68</span> <span class="jianpu-note">18</span> <span class="jianpu-note">18</span>
    </div>
  </div>
</body>
</html>
